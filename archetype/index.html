{code:"P1",emoji:"🔨",label:"Autodidacte Fondateur",
short:"Vous avez créé votre boîte sans filet. Le terrain vous a formé plus que l'école.",
tension:"Potentialité d'un syndrome de l'imposteur, avec le contrôle comme mécanisme de défense. Vous pourriez avoir du mal à déléguer — parce que personne ne ferait les choses « comme vous ».",
souverainete:"Très indépendant dans vos décisions — mais votre légitimité pourrait vaciller face à un interlocuteur diplômé ou technique. L'expert-comptable, l'avocat, le consultant : leur savoir peut vous impressionner plus qu'il ne devrait.",
influence:"Vous avez tendance à ne faire confiance qu'à vous. Le risque ? Ignorer des expertises qui pourraient vous protéger. Le jour où ça coince, vers qui vous tournez-vous ?",
concret:"Clance et Imes (1978) ont montré que le syndrome de l'imposteur touche particulièrement les personnes compétentes qui attribuent leur réussite à la chance plutôt qu'à leur valeur. Chez le fondateur autodidacte, cela peut se traduire par un besoin de tout contrôler — parce que déléguer, c'est risquer d'exposer ce qu'on pense ne pas savoir. Noam Wasserman (Harvard, 2012) a documenté dans The Founder's Dilemmas que plus un fondateur garde le contrôle longtemps, plus il réduit la valeur potentielle de son entreprise. Le paradoxe est là : le réflexe qui vous a permis de construire pourrait être celui qui freine la suite.",
signaux:["Vous retardez une décision parce que vous voulez d'abord « tout comprendre » par vous-même","Votre agenda ne contient aucun rendez-vous de conseil ou de mentoring","Un collaborateur compétent a quitté l'entreprise en disant qu'il « n'avait pas de marge de manœuvre »"],
cout:"Pour un fondateur autodidacte, le coût de la non-décision est souvent un coût d'opportunité invisible : le marché que vous n'avez pas attaqué parce que vous n'aviez « pas le temps d'y réfléchir », le recrutement stratégique que vous repoussez parce que « personne ne peut faire ce que je fais ».",
questions:["À qui faites-vous vraiment confiance pour challenger vos décisions ?", "Quelle décision repoussez-vous parce que vous n'avez personne à qui en parler ?", "Si vous tombiez malade demain pendant trois mois — que se passerait-il dans l'entreprise ?", "Quel est le dernier conseil d'un expert que vous avez ignoré — et pourquoi ?", "Quand avez-vous dit « je ne sais pas » pour la dernière fois devant votre équipe ?"]},
{code:"P2",emoji:"🔑",label:"Autodidacte Repreneur",
short:"Vous avez racheté une entreprise que vous ne connaissiez pas. Tout était à conquérir.",
tension:"Une légitimité à construire face à l'historique. Le fantôme du prédécesseur pourrait encore hanter les couloirs — et peut-être certaines de vos décisions ?",
souverainete:"Votre souveraineté a pu être fragilisée au début — les salariés historiques « savent mieux ». Vous n'êtes pas celui qui a construit. Est-ce que ça pèse encore ?",
influence:"Les salariés historiques peuvent détenir un pouvoir de référence. Votre DAF pourrait être devenu votre pilote sans que vous l'ayez décidé. Le prédécesseur — parti ou présent — vote-t-il encore ?",
concret:"Les recherches sur la socialisation organisationnelle montrent qu'un nouveau dirigeant met en moyenne 18 à 24 mois à être pleinement légitime aux yeux des équipes en place. Pour un repreneur, ce délai peut être plus long encore : vous n'avez pas l'histoire, pas les codes, pas les réseaux internes. Handler (1994) a montré que dans les transitions de direction, le pouvoir de référence des « anciens » — ceux qui étaient là avant — peut dépasser le pouvoir formel du nouveau dirigeant. C'est une dynamique normale, pas un échec. Mais la reconnaître est la première condition pour en sortir.",
signaux:["Vous dites souvent « il faut respecter ce qui a été fait avant »","Votre comité de direction contient encore une majorité de personnes qui étaient là avant vous","Vous hésitez à changer un fournisseur historique même quand les conditions ne sont plus bonnes"],
cout:"Pour un repreneur, le coût de la non-décision est un coût de légitimité : chaque mois où vous ne transformez pas, l'entreprise reste celle de l'autre. Et les équipes continuent de comparer.",
questions:["Quelles décisions repoussez-vous parce que « les anciens ne comprendraient pas » ?", "Qui dans l'entreprise compare encore ce que vous faites à ce que faisait votre prédécesseur ?", "Quelle est la première chose que vous avez changée — et celle que vous n'avez toujours pas osé toucher ?", "À quel moment avez-vous senti que les équipes ont commencé à vous faire confiance ?", "Quel sujet évitez-vous d'aborder en comité parce que « c'était comme ça avant » ?"]},
{code:"P3",emoji:"👨‍👦",label:"Héritier",

tension:"Une ambivalence possible entre continuité et rupture. Chaque innovation pourrait être perçue comme une transgression, chaque tradition vécue comme un carcan. Se reconnaissez-vous ?",

signaux:["Vous avez du mal à licencier un collaborateur que votre famille apprécie","Vos décisions d'investissement sont validées par un membre de la famille avant d'être actées","Vous ressentez de la culpabilité quand vous innovez dans une direction différente de l'héritage"],

questions:["Quelle décision prendriez-vous demain si le regard de votre famille ne comptait plus ?", "Quand un membre de votre famille commente une de vos décisions — qu'est-ce que ça vous fait ?", "Y a-t-il un collaborateur que vous gardez parce qu'il fait partie de l'histoire familiale ?", "Quel projet avez-vous abandonné — ou jamais lancé — pour ne pas « trahir l'héritage » ?", "Si vous deviez vendre l'entreprise demain — pourriez-vous en parler à votre famille sans culpabilité ?"]},
{code:"P4",emoji:"🪂",label:"Cadre Basculé",

tension:"L'atterrissage a pu être violent. Vos méthodes de grand groupe ne fonctionnent peut-être pas ici. Votre CV n'impressionne pas forcément — la légitimité viendrait d'en bas, pas d'en haut.",
souverainete:"Vous avez peut-être connu une phase de sur-confiance, puis un doute profond. Oscillez-vous entre imposer vos méthodes et capituler face à la culture locale ?",
influence:"Votre ancien monde vous guide-t-il encore ? Cherchez-vous des process là où il faudrait du terrain ?",
concret:"Herminia Ibarra (2003, Working Identity) a montré que les transitions professionnelles profondes ne sont pas des changements de poste — ce sont des reconstructions identitaires. Le cadre qui devient dirigeant de PME doit abandonner une partie de ce qui faisait sa valeur dans l'ancien monde : les process, la structure, le réseau. Ce deuil-là prend du temps. Et pendant ce temps, les réflexes de l'ancien monde continuent de guider les décisions du nouveau. Ce n'est pas de l'incompétence — c'est une transition inachevée.",
signaux:["Vous utilisez encore du jargon de votre ancien groupe (« KPI », « task force », « reporting ») et les équipes lèvent les yeux au ciel","Vous avez mis en place un outil de gestion que personne n'utilise","Votre plus grand succès ici n'a rien à voir avec vos méthodes d'avant"],
cout:"Pour un cadre basculé, le coût de la non-décision est un coût d'adaptation : chaque mois où vous essayez de faire fonctionner vos anciennes méthodes est un mois de perdu pour en inventer de nouvelles.",
questions:["Qu'avez-vous cessé de faire « comme avant » — et que continuez-vous sans vous en rendre compte ?", "Quel réflexe de votre ancien monde vous a déjà coûté cher ici ?", "Quand avez-vous réalisé que votre CV n'impressionnait personne dans cette entreprise ?", "Quel outil ou process avez-vous importé de votre ancienne vie que personne n'utilise ?", "À quel moment avez-vous compris que diriger une PME était un autre métier ?"]},
{code:"P5",emoji:"🧱",label:"Bras Droit devenu Patron",
short:"Vous étiez le n°2 — technique, commercial, ou financier. On vous a donné les clés.",
tension:"Le deuil de l'expertise n'est peut-être pas fait. Vous piloteriez encore depuis un seul étage — celui de votre ancien métier. Déléguez-vous là où vous êtes fort, en vous cramponnant au reste ?",
souverainete:"Votre souveraineté pourrait être forte sur votre domaine d'origine, mais fragile partout ailleurs. Surestimez-vous ce que vous connaissez ?",
influence:"Êtes-vous encore l'expert de votre ancien métier ? Le nouveau DAF, le nouveau commercial : leur faites-vous confiance parce que leur domaine vous échappe ?",
concret:"Ibarra (2003) parle du « deuil de l'expertise » : quand un spécialiste devient généraliste, il perd ce qui fondait sa valeur et sa confiance en lui. Pour le bras droit devenu patron, la tentation est de continuer à piloter depuis son ancien métier — la zone où il se sent compétent et légitime. French et Raven (1959) éclairent le mécanisme : dans les domaines qu'il ne maîtrise pas, il accorde un pouvoir d'expertise disproportionné à ses nouveaux collaborateurs — non par choix, mais par inconfort. La souveraineté décisionnelle devient asymétrique : forte ici, fragile là.",
signaux:["Vous passez plus de temps dans votre ancien domaine que sur la direction générale","Les décisions dans les domaines que vous ne maîtrisez pas prennent deux fois plus de temps","Votre équipe vous consulte encore comme un expert, pas comme un dirigeant"],
cout:"Pour un bras droit promu, le coût de la non-décision est un coût d'angle mort : ce que vous ne voyez pas dans les domaines qui ne sont pas les vôtres peut vous coûter bien plus que ce que vous maîtrisez dans le vôtre.",
questions:["Dans quel domaine prenez-vous des décisions les yeux fermés — et dans lequel les laissez-vous prendre par d'autres ?", "Quel sujet évitez-vous en réunion parce que ce n'est pas votre domaine ?", "Si on vous retirait votre ancien métier — que resterait-il de votre légitimité de dirigeant ?", "Combien de temps passez-vous encore chaque semaine sur votre ancien domaine d'expertise ?", "Quel collaborateur a pris un pouvoir réel sur un domaine que vous ne maîtrisez pas — et le savez-vous ?"]},
{code:"P6",emoji:"🚀",label:"Serial Entrepreneur",

souverainete:"Très indépendant, peut-être excessivement. Prenez-vous des décisions trop vite parce que « vous avez déjà vu ça » ? Quelqu'un vous freine-t-il encore ?",
influence:"Votre entourage a-t-il appris à ne plus dire non ? Votre énergie inspire — mais écrase-t-elle parfois les signaux faibles ?",
concret:"Les recherches sur l'entrepreneuriat sériel (Westhead & Wright, 1998) montrent que l'expérience passée est à la fois un atout et un piège : le serial entrepreneur reconnaît plus vite les patterns — mais il peut aussi plaquer des solutions anciennes sur des problèmes nouveaux. La confiance née de l'expérience peut devenir de la sur-confiance. Et l'entourage, impressionné par le palmarès, n'ose plus challenger. Kahneman (2011) appelle ça le « biais de l'expert confiant » : plus on a réussi, moins on doute — et moins on doute, plus le risque d'erreur augmente.",
signaux:["Votre entourage commence ses phrases par « oui mais cette fois écoute… »","Vous avez lancé quelque chose de nouveau alors que le précédent projet n'est pas stabilisé","Personne dans votre équipe ne vous contredit en réunion"],
cout:"Pour un serial entrepreneur, le coût de la non-décision est paradoxal : ce n'est pas que vous ne décidez pas — c'est que vous décidez trop, trop vite, sans approfondir. Le vrai coût, c'est la décision bâclée déguisée en rapidité.",
questions:["Qui dans votre entourage ose encore vous dire que vous allez trop vite ?", "Quel projet avez-vous lancé sur un coup de tête — et que vous regrettez ?", "Combien de chantiers avez-vous ouverts cette année que personne ne vous a demandés ?", "Quand vous vous ennuyez dans l'entreprise — que faites-vous ? Vous la quittez ou vous la secouez ?", "Votre dernière « bonne idée » — a-t-elle créé de la valeur ou de la charge pour votre équipe ?"]},
{code:"P7",emoji:"💰",label:"Investisseur devenu Opérationnel",
short:"Vous avez mis de l'argent, puis vous avez pris le volant. Deux rôles, deux logiques.",

souverainete:"Forte sur les chiffres, votre souveraineté pourrait être fragile sur le terrain humain. Le tableau de bord est-il devenu votre seule zone de confort ?",
influence:"Votre pouvoir repose sur l'argent. Les gens vous obéissent — mais vous suivent-ils vraiment ?",
concret:"La théorie de l'agence (Jensen & Meckling, 1976) décrit la tension structurelle entre celui qui détient le capital et celui qui manage. Quand c'est la même personne, cette tension ne disparaît pas — elle s'internalise. L'investisseur devenu opérationnel porte deux grilles de lecture en permanence : celle du rendement et celle du terrain. Tversky et Kahneman (1974) ont montré que les données chiffrées créent un ancrage cognitif puissant — on décide à partir de ce qu'on mesure, et on oublie ce qu'on ne mesure pas. Le risque pour vous : des décisions optimales sur le papier, désastreuses sur le terrain humain.",
signaux:["Votre première question face à un problème est « combien ça coûte » plutôt que « qu'est-ce qui se passe »","Vous ne connaissez pas le prénom de certains collaborateurs clés","Les meilleurs éléments partent et vous ne comprenez pas pourquoi"],
cout:"Pour un investisseur devenu opérationnel, le coût de la non-décision est un coût humain qui finit par devenir financier : les talents qui partent, l'engagement qui s'éteint, la culture qui se dégrade — tout ça se paie, mais jamais dans les colonnes où vous regardez.",
questions:["Vos équipes vous obéissent-elles — ou vous suivent-elles ?", "Quelle est la dernière décision que vous avez prise pour des raisons humaines plutôt que financières ?", "Si vous retiriez votre argent demain — les gens resteraient-ils ?", "Connaissez-vous le prénom des enfants de vos collaborateurs clés ?", "Quel est le turnover réel de votre entreprise — et qu'est-ce qu'il vous dit ?"]},
{code:"P8",emoji:"👻",label:"Associé Survivant",

souverainete:"Très indépendant par réaction — mais cette blessure pourrait créer une hypervigilance qui ralentit. Contrôlez-vous plus que nécessaire ?",
influence:"Faites-vous encore confiance à quelqu'un pour partager le pouvoir ? Le prochain bras droit paiera-t-il pour le précédent — sans le savoir ?",
concret:"La recherche sur la confiance organisationnelle (Mayer, Davis & Schoorman, 1995) montre que la confiance, une fois brisée, se reconstruit difficilement — et que la méfiance qui s'installe après une rupture affecte tous les liens professionnels suivants, pas seulement la relation d'origine. Pour l'associé survivant, cette hypervigilance est une réponse rationnelle à une blessure réelle. Mais elle a un coût : chaque opportunité de partenariat, de délégation ou d'association est filtrée par le prisme de l'ancienne rupture. Le prochain collaborateur de confiance sera jugé à l'aune du précédent — sans le savoir.",
signaux:["Vous avez refusé un partenariat intéressant parce que « ça impliquait de partager la décision »","Votre n°2 a un périmètre opérationnel mais aucun pouvoir décisionnel réel","Vous comparez inconsciemment chaque nouveau collaborateur de confiance à votre ancien associé"],
cout:"Pour un associé survivant, le coût de la non-décision est un coût de confiance : chaque opportunité qui nécessite de s'associer, de déléguer vraiment, ou de faire entrer quelqu'un au capital est écartée d'office. L'entreprise est protégée — mais elle est seule.",
questions:["Qu'est-ce que votre ancien associé vous empêche encore de faire aujourd'hui ?", "Votre prochain bras droit — sera-t-il jugé pour ce qu'il fait ou pour ce que l'autre a fait ?", "Combien de partenariats avez-vous refusés depuis la rupture — et combien étaient de bonnes opportunités ?", "Quand quelqu'un propose « et si on s'associait » — quelle est votre première réaction ?", "À qui avez-vous donné un vrai pouvoir de décision depuis le départ de votre associé ?"]},
{code:"P9",emoji:"🏰",label:"Gardien du Patrimoine",
short:"Votre mission : préserver l'acquis. Ne pas perdre pourrait être plus important que gagner.",
tension:"Une aversion au risque qui pourrait être constitutive. Chaque décision est-elle perçue comme une menace potentielle ?",
souverainete:"Vous pourriez être très dépendant des données et de l'expertise pour sécuriser vos décisions. Attendez-vous la certitude pour trancher — sachant qu'elle n'existe pas ?",
influence:"L'expert-comptable et l'avocat détiennent-ils un pouvoir disproportionné ? Leur « non » pèse-t-il plus que votre « oui » ?",

signaux:["Votre phrase type est « on ne change pas une équipe qui gagne » — même quand elle ne gagne plus vraiment","Vous demandez systématiquement un deuxième avis avant de valider un investissement","Le mot « risque » apparaît dans vos objections plus souvent que le mot « opportunité »"],
cout:"Pour un gardien, le coût de la non-décision est un coût d'érosion : le patrimoine que vous protégez perd de la valeur chaque jour où le marché avance sans vous. Préserver n'est pas immobiliser.",
questions:["Combien vous coûte chaque mois la décision que vous ne prenez pas ?", "Quel investissement avez-vous refusé trois fois — et qui attend toujours ?", "Quand votre expert-comptable dit non — est-ce que vous challengez ou est-ce que vous obéissez ?", "Quel concurrent a pris un marché pendant que vous « sécurisiez » ?", "Si vous pouviez prendre une seule décision sans demander l'avis de personne — ce serait laquelle ?"]},
{code:"P10",emoji:"🧭",label:"Stratège-Développeur",

concret:"Henry Mintzberg (1987) distingue la stratégie délibérée — celle qu'on planifie — de la stratégie émergente — celle qui naît du terrain. Le stratège-développeur excelle dans la première et néglige souvent la seconde. Les recherches sur le leadership montrent que la capacité à « tenir » (sustaining leadership) est une compétence distincte de la capacité à « lancer » (initiating leadership). L'une n'implique pas l'autre. Votre force — voir grand, voir loin — peut devenir votre angle mort si personne ne vérifie que la vision se traduit en réalité opérationnelle.",

questions:["Parmi vos projets en cours, lequel avance sans que vous sachiez vraiment où il en est ?", "Quel projet avez-vous lancé dont plus personne ne parle — et qui tourne quand même ?", "Combien de vos idées stratégiques ont réellement été exécutées comme vous les imaginiez ?", "Votre équipe opérationnelle — sait-elle ce que vous voulez vraiment, ou interprète-t-elle ?", "Si vous arrêtiez d'avoir des idées pendant 6 mois — que se passerait-il dans l'entreprise ?"]},

const playJingle = React.useCallback(()=>{
try {
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const master = ctx.createGain();
master.gain.setValueAtTime(0.35, ctx.currentTime);
master.connect(ctx.destination);
const bell = (freq, start, dur, vol=0.12) => {
const osc = ctx.createOscillator();
const osc2 = ctx.createOscillator();
const osc3 = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = "sine"; osc.frequency.value = freq;
osc2.type = "sine"; osc2.frequency.value = freq * 3;
osc3.type = "sine"; osc3.frequency.value = freq * 5;
const g2 = ctx.createGain(); g2.gain.value = 0.08;
const g3 = ctx.createGain(); g3.gain.value = 0.03;
osc.connect(gain); osc2.connect(g2); osc3.connect(g3);
g2.connect(gain); g3.connect(gain);
gain.connect(master);
const t = ctx.currentTime + start;
gain.gain.setValueAtTime(0, t);
gain.gain.linearRampToValueAtTime(vol, t + 0.02);
gain.gain.exponentialRampToValueAtTime(vol * 0.6, t + 0.15);
gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
osc.start(t); osc.stop(t + dur);
osc2.start(t); osc2.stop(t + dur);
osc3.start(t); osc3.stop(t + dur);
};
const bloom = (freq, start, attack, dur, vol=0.08) => {
const osc = ctx.createOscillator();
const osc2 = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = "sine"; osc.frequency.value = freq;
osc2.type = "sine"; osc2.frequency.value = freq * 2.005;
const g2 = ctx.createGain(); g2.gain.value = 0.05;
osc.connect(gain); osc2.connect(g2); g2.connect(gain);
gain.connect(master);
const t = ctx.currentTime + start;
gain.gain.setValueAtTime(0, t);
gain.gain.linearRampToValueAtTime(vol, t + attack);
gain.gain.setValueAtTime(vol, t + dur - 2.5);
gain.gain.linearRampToValueAtTime(0, t + dur);
osc.start(t); osc.stop(t + dur + 0.1);
osc2.start(t); osc2.stop(t + dur + 0.1);
};
bell(587.33, 0.3, 1.8, 0.13);
bell(739.99, 0.55, 1.5, 0.12);
bell(880.00, 0.8, 1.5, 0.13);
bell(587.33*2, 1.1, 2.0, 0.10);
bell(880.00, 2.0, 1.5, 0.08);
bell(587.33*2, 2.25, 2.0, 0.07);
bell(1108.73, 2.55, 2.5, 0.06);
bloom(293.66, 3.0, 1.8, 4.5, 0.05);
bloom(440.00, 3.2, 1.5, 4.0, 0.06);
bloom(587.33, 3.5, 1.8, 3.5, 0.06);
bloom(739.99, 4.0, 1.5, 3.0, 0.04);
master.gain.setValueAtTime(0.35, ctx.currentTime + 6.5);
master.gain.linearRampToValueAtTime(0, ctx.currentTime + 8.5);
} catch(e) {}
},[]);

<h1 style={{fontFamily:"var(--serif)",fontSize:"2.2rem",fontWeight:"400",fontStyle:"italic",margin:"0 0 .5rem"}}>Quel dirigeant êtes-vous ?</h1>
<p style={{fontSize:"14px",color:"rgba(255,255,255,.6)",lineHeight:"1.7",maxWidth:"500px",margin:"0 auto"}}>
10 façons d'arriver à la tête d'une PME.<br/>Aucune ne prépare à ce qui suit.
</p>
</div>
<div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:"10px",padding:"1.5rem",marginBottom:"1rem",animation:"fadeIn .3s ease"}}>
<div style={{fontSize:"16px",fontWeight:"600",color:"var(--ink)",marginBottom:"10px"}}>De quoi s'agit-il ?</div>
<p style={{fontSize:"13px",color:"var(--ink-2)",lineHeight:"1.75",marginBottom:"12px"}}>
Un dirigeant qui a <strong>fondé</strong> son entreprise ne porte pas les mêmes réflexes qu'un dirigeant qui en a <strong>hérité</strong>, qui l'a <strong>rachetée</strong>, ou qui y a été <strong>propulsé</strong> depuis un poste de n°2.
</p>
<p style={{fontSize:"13px",color:"var(--ink-2)",lineHeight:"1.75",marginBottom:"12px"}}>
Ces parcours créent des <strong>tensions décisionnelles spécifiques</strong> — des zones où le dirigeant peut être fragilisé sans toujours le savoir. L'héritier peut se battre contre un fantôme familial. Le repreneur a certainement dû conquérir une légitimité que personne ne lui a donnée. Le serial entrepreneur peut décider trop vite parce qu'« il a déjà vu ça, il sait ». Et bien d'autres cas encore.
</p>
<p style={{fontSize:"13px",color:"var(--ink-2)",lineHeight:"1.75",marginBottom:"12px"}}>
Ces différences forgent des styles bien distincts et des processus décisionnels à part. Non comparables. Mais c'est ne rien comprendre à ce qu'est un entrepreneur si on n'en tient pas compte.
</p>
<p style={{fontSize:"13px",color:"var(--ink-2)",lineHeight:"1.75",marginBottom:"12px"}}>
Nous avons identifié <strong>10 profils</strong> assez récurrents, présentés ici d'une façon un peu ludique. Le but : identifier celui — ou ceux — auquel vous vous identifiez le plus.
</p>
<p style={{fontSize:"13px",color:"var(--ink-2)",lineHeight:"1.75",marginBottom:"12px"}}>
Mais comme chaque parcours est unique et chaque situation inédite, nous complétons avec <strong>3 questions simples</strong> qui vont permettre d'affiner le profil. Parce que la vraie question derrière tout ça, c'est : pourquoi, parfois, face à certaines situations, <strong>la décision pèse</strong>.
</p>
<p style={{fontSize:"13px",color:"var(--ink)",lineHeight:"1.75",fontWeight:"500"}}>
Et que faisons-nous dans ce cas-là, en général ? On reporte. On procrastine. On attend plus d'information. On consulte un expert de plus. Mais au final, la non-décision — qui est une forme de décision en soi — a un coût. En euros, en énergie, en opportunités manquées, en crédibilité. Et parfois — pour ne pas dire tout le temps — en nuits blanches. Avec des conséquences directes sur l'équilibre personnel, la santé, la lucidité. Et sur la capacité à prendre la prochaine décision.
</p>
</div>
<div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:"10px",padding:"1.5rem",marginBottom:"1rem",animation:"fadeIn .35s ease"}}>
<div style={{fontSize:"16px",fontWeight:"600",color:"var(--ink)",marginBottom:"10px"}}>Sur quoi repose ce test ?</div>
<p style={{fontSize:"13px",color:"var(--ink-2)",lineHeight:"1.75",marginBottom:"12px"}}>
Les 10 archétypes ne sont pas inventés — ils s'appuient sur plusieurs décennies de recherche en entrepreneuriat, en psychologie sociale et en dynamiques de pouvoir.
</p>
<div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"12px"}}>
<div style={{padding:"10px 12px",background:"var(--paper)",borderRadius:"6px",border:"1px solid var(--paper-3)"}}>
<div style={{fontSize:"12px",fontWeight:"600",color:"var(--ink)"}}>Typologies entrepreneuriales</div>
<div style={{fontSize:"11px",color:"var(--ink-3)",lineHeight:"1.6"}}>Norman Smith (1967) a posé les premières bases en distinguant l'entrepreneur artisan de l'entrepreneur opportuniste. Depuis, la recherche a identifié des profils récurrents selon le parcours d'accès au pouvoir — fondateur, repreneur, héritier, intrapreneur.</div>
</div>
<div style={{padding:"10px 12px",background:"var(--paper)",borderRadius:"6px",border:"1px solid var(--paper-3)"}}>
<div style={{fontSize:"12px",fontWeight:"600",color:"var(--ink)"}}>Succession et transmission</div>
<div style={{fontSize:"11px",color:"var(--ink-3)",lineHeight:"1.6"}}>Wendy Handler (1994) et les travaux sur les entreprises familiales ont documenté les tensions spécifiques de l'héritier — la quête de légitimité, le poids du fondateur, l'ambivalence continuité/rupture.</div>
</div>
<div style={{padding:"10px 12px",background:"var(--paper)",borderRadius:"6px",border:"1px solid var(--paper-3)"}}>
<div style={{fontSize:"12px",fontWeight:"600",color:"var(--ink)"}}>Transitions identitaires</div>
<div style={{fontSize:"11px",color:"var(--ink-3)",lineHeight:"1.6"}}>Herminia Ibarra (2003, <em>Working Identity</em>) a montré que changer de rôle professionnel — passer de n°2 à patron, de cadre à dirigeant — ne se résume pas à un changement de poste. C'est une reconstruction identitaire qui prend du temps et crée des zones de vulnérabilité.</div>
</div>
<div style={{padding:"10px 12px",background:"var(--paper)",borderRadius:"6px",border:"1px solid var(--paper-3)"}}>
<div style={{fontSize:"12px",fontWeight:"600",color:"var(--ink)"}}>Syndrome de l'imposteur</div>
<div style={{fontSize:"11px",color:"var(--ink-3)",lineHeight:"1.6"}}>Pauline Clance et Suzanne Imes (1978) ont décrit ce mécanisme où un dirigeant compétent doute secrètement de sa légitimité. Particulièrement présent chez les autodidactes et les héritiers.</div>
</div>
<div style={{padding:"10px 12px",background:"var(--paper)",borderRadius:"6px",border:"1px solid var(--paper-3)"}}>
<div style={{fontSize:"12px",fontWeight:"600",color:"var(--ink)"}}>Dynamiques de pouvoir et d'influence</div>
<div style={{fontSize:"11px",color:"var(--ink-3)",lineHeight:"1.6"}}>French et Raven (1959) ont identifié 5 formes de pouvoir social — dont le pouvoir d'expertise et le pouvoir de référence, invisibles mais déterminants. Chaque archétype est exposé différemment à ces formes d'influence.</div>
</div>
</div>
<p style={{fontSize:"11px",color:"var(--ink-3)",lineHeight:"1.6",fontStyle:"italic"}}>
Ces fondements scientifiques nourrissent la grille de lecture — mais votre profil reste le vôtre. La recherche éclaire des tendances, pas des destins.
</p>
</div>

<p style={{fontSize:"12px",color:"var(--ink-2)",lineHeight:"1.5"}}>Ce qui pèse structurellement sur vos décisions — pas un défaut, un mécanisme à connaître.</p>

<div key={i} style={{background:"var(--paper)",borderRadius:"6px",padding:"10px 12px",borderLeft:"3px solid var(--gold)"}}>
<p style={{fontSize:"12px",color:"var(--ink-2)",lineHeight:"1.7"}}>{s}</p>
</div>
))}
</div>
</div>
)}
{}
<div style={{background:"#fff",border:"2px solid var(--gold)",borderRadius:"10px",padding:"1.5rem",marginBottom:"1.5rem"}}>
<div style={{fontFamily:"var(--serif)",fontSize:"1.2rem",fontStyle:"italic",color:"var(--ink)",marginBottom:"10px"}}>Une question pour vous — et vous seul</div>
<p style={{fontSize:"13px",color:"var(--ink-2)",lineHeight:"1.7",marginBottom:"14px"}}>
Si tout ce que vous venez de lire a un tant soit peu résonné, alors {arch2?"les questions qui suivent méritent":"la question qui suit mérite"} qu'on s'y arrête. Ce ne {arch2?"sont":"'est"} pas {arch2?"des questions pièges":"une question piège"} ni un exercice de style — {arch2?"ce sont des questions":"c'est une question"} que les dirigeants de votre profil évitent souvent de se poser. Parce que la réponse honnête oblige à regarder ce qu'on préfère ne pas voir.
</p>
<div style={{background:"rgba(199,157,67,.06)",border:"1px solid rgba(199,157,67,.25)",borderRadius:"8px",padding:"16px 18px",marginBottom:arch2?"10px":"14px"}}>
<div style={{fontFamily:"var(--mono)",fontSize:"8px",textTransform:"uppercase",letterSpacing:".06em",color:"var(--gold)",marginBottom:"4px",fontWeight:"600"}}>En tant que {arch.label}</div>
<div style={{fontFamily:"var(--serif)",fontSize:"1.3rem",fontStyle:"italic",color:"var(--ink)",lineHeight:"1.6"}}>{pickQ(arch.questions)}</div>
</div>
{arch2 && (
<div style={{background:"rgba(139,92,246,.04)",border:"1px solid rgba(139,92,246,.15)",borderRadius:"8px",padding:"16px 18px",marginBottom:"14px"}}>
<div style={{fontFamily:"var(--mono)",fontSize:"8px",textTransform:"uppercase",letterSpacing:".06em",color:"#8b5cf6",marginBottom:"4px",fontWeight:"600"}}>En tant que {arch2.label}</div>
<div style={{fontFamily:"var(--serif)",fontSize:"1.2rem",fontStyle:"italic",color:"var(--ink)",lineHeight:"1.6"}}>{pickQ(arch2.questions)}</div>
</div>
)}
<p style={{fontSize:"12px",color:"var(--ink-3)",lineHeight:"1.6"}}>
Vous n'avez pas besoin d'y répondre maintenant. Mais si elle vous reste en tête dans les prochains jours — c'est qu'elle touche quelque chose d'important.
</p>
</div>
<div style={{background:"linear-gradient(135deg,#1A2535 0%,#2e4a63 80%)",borderRadius:"12px",padding:"2rem",marginBottom:"1.5rem"}}>
<div style={{fontFamily:"var(--serif)",fontSize:"1.4rem",fontStyle:"italic",color:"#f8f6f2",marginBottom:"12px",textAlign:"center"}}>Ce que vous venez de lire est un premier aperçu.</div>
<p style={{fontSize:"13px",color:"rgba(255,255,255,.6)",lineHeight:"1.7",marginBottom:"16px"}}>
Votre archétype est un point de départ — pas un diagnostic. Derrière ce profil, il y a 5 autres dimensions que ce test ne mesure pas : votre style décisionnel, les zones où votre souveraineté est fragilisée, votre façon d'interagir sous pression, vos valeurs profondes, et votre rythme cognitif.
</p>
<div style={{background:"rgba(199,157,67,.1)",border:"1px solid rgba(199,157,67,.25)",borderRadius:"8px",padding:"14px 16px",marginBottom:"16px"}}>
<div style={{fontFamily:"var(--mono)",fontSize:"9px",textTransform:"uppercase",letterSpacing:".08em",color:"var(--gold)",marginBottom:"6px",fontWeight:"600"}}>CLAIR® — Tiers de confiance décisionnel</div>
<p style={{fontSize:"13px",color:"rgba(255,255,255,.75)",lineHeight:"1.7",marginBottom:"10px"}}>
CLAIR n'est ni un coach, ni un consultant, ni un mentor. C'est un <strong style={{color:"#f8f6f2"}}>tiers indépendant</strong> qui n'a aucun intérêt dans vos décisions — aucun. Pas de part au capital, pas de facturation au résultat, pas d'avis sur ce que vous « devriez » faire.
</p>
<p style={{fontSize:"13px",color:"rgba(255,255,255,.75)",lineHeight:"1.7",marginBottom:"10px"}}>
Son rôle : vous aider à <strong style={{color:"#f8f6f2"}}>décider en pleine lucidité</strong>. Nommer ce qui pèse — influences invisibles, décisions repoussées, angles morts. Pas pour vous dire quoi faire, mais pour que votre décision soit la vôtre. Vraiment la vôtre.
</p>
<p style={{fontSize:"13px",color:"rgba(255,255,255,.75)",lineHeight:"1.7"}}>
Parce que personne ne connaît votre entreprise aussi bien que vous. Et personne n'est mieux placé que vous pour prendre la bonne décision — à condition d'y voir clair.
</p>
</div>
<div style={{textAlign:"center"}}>
<p style={{fontSize:"14px",color:"rgba(255,255,255,.85)",lineHeight:"1.7",marginBottom:"16px",fontWeight:"500"}}>
Un face-à-face exploratoire de 45 minutes — confidentiel, sans engagement — pour aller au-delà de l'archétype et cartographier ce qui pèse réellement sur vos décisions.
</p>
<a href={"mailto:contact@fmdg-conseil.fr?subject="+encodeURIComponent("CLAIR — Face-à-face exploratoire ("+arch.label+")")+"&body="+encodeURIComponent("Bonjour,\n\nJ'ai identifié mon archétype ("+arch.label+(arch2?" + "+arch2.label:"")+") et je souhaiterais approfondir avec un face-à-face exploratoire.\n\n"+(ctx.parcours?"Parcours : "+ctx.parcours+"\n":"")+(ctx.nb_associes?ctx.nb_associes+" associé(s)"+(ctx.repartition?" — "+ctx.repartition:"")+"\n":"")+(ctx.fondateur_present===true?"Fondateur encore présent\n":ctx.fondateur_present===false?"Fondateur parti\n":"")+"\n")}
style={{display:"inline-block",background:"var(--gold)",color:"#fff",border:"none",borderRadius:"8px",padding:"14px 36px",fontSize:"15px",fontWeight:"600",cursor:"pointer",textDecoration:"none",boxShadow:"0 4px 20px rgba(199,157,67,.4)"}}>
Demander un face-à-face exploratoire
</a>
<div style={{fontSize:"10px",color:"rgba(255,255,255,.3)",marginTop:"10px",fontFamily:"var(--mono)"}}>45 min · confidentiel · sans engagement · Grenoble et visio</div>
</div>
</div>
<div style={{textAlign:"center",padding:"1rem 0",borderTop:"1px solid var(--border)"}}>
<div style={{fontFamily:"var(--mono)",fontSize:"10px",letterSpacing:".1em",textTransform:"uppercase",color:"var(--ink-3)",marginBottom:"4px"}}>CLAIR® · Tiers de confiance décisionnel</div>
<p style={{fontSize:"11px",color:"var(--ink-3)",lineHeight:"1.5",maxWidth:"400px",margin:"0 auto"}}>
Ni coach, ni consultant, ni mentor. Un tiers indépendant qui n'a aucun intérêt dans vos décisions — sauf que vous les preniez en pleine lucidité.
</p>
</div>
<div style={{textAlign:"center",padding:"1rem 0"}}>
<button onClick={()=>{setPrimary(null);setSecondary(null);setCtx({anciennete:"",nb_associes:"",fondateur_present:null,repartition:null,parcours:""});go(0);setExpandedCode(null);setExpandedCode2(null);}} style={{background:"none",border:"1px solid var(--border)",borderRadius:"6px",padding:"8px 20px",fontSize:"12px",cursor:"pointer",color:"var(--ink-3)"}}>← Recommencer</button>
</div>
</div>
);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
